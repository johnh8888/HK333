name: V9 AI 时序预测系统

on:
  schedule:
    # 香港时间每天 22:30 自动运行
    - cron: '30 14 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:

    runs-on: ubuntu-latest

    steps:

      # ==========================================================
      # 拉取仓库
      # ==========================================================

      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================================
      # Python
      # ==========================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==========================================================
      # 显示环境
      # ==========================================================

      - name: Python Version
        run: |
          python --version
          pip --version

      # ==========================================================
      # 创建数据库（防止首次运行不存在）
      # ==========================================================

      - name: Create Empty Databases
        run: |
          touch old_macau.db
          touch hk_macau.db
          touch xin_macau.db

      # ==========================================================
      # 运行预测
      # ==========================================================

      - name: Run V9 AI Prediction
        run: |
          python sdxmacau.py \
            --order 2

      # ==========================================================
      # 提交数据库
      # ==========================================================

      - name: Commit Database
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.db

          git commit -m "V9 AI 自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" \
          || echo "No changes"

          git push

      # ==========================================================
      # 上传备份
      # ==========================================================

      - name: Upload Backup
        uses: actions/upload-artifact@v4
        with:
          name: v9-ai-backup
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db

      # ==========================================================
      # 永不失败
      # ==========================================================

      - name: Finish
        run: echo "V9 AI 时序系统运行完成"