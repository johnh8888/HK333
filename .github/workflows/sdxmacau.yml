name: 三彩种属性预测

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macau-predict
  cancel-in-progress: true

jobs:
  predict:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 升级 pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: 安装依赖
        run: |
          pip install \
            numpy \
            scipy \
            pandas \
            scikit-learn

      - name: 显示 Python 环境
        run: |
          python --version
          pip list

      - name: 运行预测系统
        run: |
          python sdxmacau.py \
            --order 3 \
            --min-ig 0.01 \
            --backtest 100

      - name: 检查数据库文件
        run: |
          ls -lh *.db || true

      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add old_macau.db hk_macau.db xin_macau.db

          if git diff --cached --quiet; then
            echo "数据库无变化"
          else
            git commit -m "自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs-backup
          retention-days: 30
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          retention-days: 7
          path: |
            *.log
            *.txt