name: 三彩种属性预测 V16-PRO

on:
  schedule:
    # 香港时间 22:30
    - cron: '30 14 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  predict:

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      # =====================================================
      # Checkout
      # =====================================================

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # Python
      # =====================================================

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =====================================================
      # Install
      # =====================================================

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      # =====================================================
      # 清理旧数据库（首次修复推荐保留）
      # =====================================================

      - name: 清理旧错误数据库
        run: |
          rm -f hk_macau.db
          rm -f old_macau.db
          rm -f xin_macau.db

      # =====================================================
      # 香港彩
      # =====================================================

      - name: 香港彩预测
        run: |
          echo "=================================================="
          echo "香港彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 香港彩 \
            --recent 240 \
            --test 10

      # =====================================================
      # 老澳门彩
      # =====================================================

      - name: 老澳门彩预测
        run: |
          echo "=================================================="
          echo "老澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 老澳门彩 \
            --recent 240 \
            --test 10

      # =====================================================
      # 新澳门彩
      # =====================================================

      - name: 新澳门彩预测
        run: |
          echo "=================================================="
          echo "新澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 新澳门彩 \
            --recent 240 \
            --test 10

      # =====================================================
      # Git Status
      # =====================================================

      - name: 检查数据库变化
        id: changes
        run: |

          git status

          if git diff --quiet hk_macau.db old_macau.db xin_macau.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # =====================================================
      # Commit
      # =====================================================

      - name: 提交数据库更新
        if: steps.changes.outputs.changed == 'true'
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add hk_macau.db
          git add old_macau.db
          git add xin_macau.db

          git commit -m "📊 自动更新数据 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || exit 0

          git pull --rebase origin main

          git push origin HEAD:main

      # =====================================================
      # Artifact Backup
      # =====================================================

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs

          path: |
            hk_macau.db
            old_macau.db
            xin_macau.db

          retention-days: 30