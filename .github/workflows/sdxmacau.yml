name: 三彩种 AI 时序预测 V9 稳定版

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:

      # ==========================================================
      # 拉取仓库
      # ==========================================================

      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================================
      # Python
      # ==========================================================

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==========================================================
      # 缓存 pip
      # ==========================================================

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v9
          restore-keys: |
            ${{ runner.os }}-pip-

      # ==========================================================
      # 安装依赖
      # ==========================================================

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      # ==========================================================
      # 查看文件
      # ==========================================================

      - name: 查看项目文件
        run: |
          pwd
          ls -lah

      # ==========================================================
      # 运行 AI 时序预测
      # ==========================================================

      - name: 运行预测
        run: |
          python sdxmacau.py \
            --order 2 \
            --backtest 120

      # ==========================================================
      # 查看数据库
      # ==========================================================

      - name: 查看数据库文件
        run: |
          ls -lh *.db || true

      # ==========================================================
      # 提交数据库更新
      # ==========================================================

      - name: 提交数据库更新
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.db

          git diff --cached --quiet && echo "无变化" && exit 0

          git commit -m "AI预测自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')"

          git push

      # ==========================================================
      # 上传数据库备份
      # ==========================================================

      - name: 上传数据库备份
        uses: actions/upload-artifact@v4
        with:
          name: macau-ai-v9-backup
          path: |
            *.db

      # ==========================================================
      # 上传日志
      # ==========================================================

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: |
            *.log