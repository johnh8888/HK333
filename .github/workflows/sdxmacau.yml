name: 老澳门属性预测

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 运行预测
        run: python sdxmacau.py sync --order 2 --threshold 0.55
      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sdxmacau.db
          git commit -m "自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "无变化"
          git push
      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: sdxmacau-db-backup
          path: sdxmacau.db
