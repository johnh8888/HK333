name: 三彩种属性预测 V17-PRO

on:
  schedule:
    - cron: '30 14 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  predict:

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 香港彩预测
        run: |

          echo "=================================================="
          echo "香港彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 香港彩 \
            --test 10

      - name: 老澳门彩预测
        run: |

          echo "=================================================="
          echo "老澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 老澳门彩 \
            --test 10

      - name: 新澳门彩预测
        run: |

          echo "=================================================="
          echo "新澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 新澳门彩 \
            --test 10

      - name: 检查数据库变化
        id: changes
        run: |

          if git diff --quiet old_macau.db hk_macau.db xin_macau.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交数据库更新
        if: steps.changes.outputs.changed == 'true'
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add old_macau.db hk_macau.db xin_macau.db

          git commit -m "📊 自动更新数据 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || exit 0

          git pull --rebase origin main

          git push

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db
          retention-days: 30