name: 澳门彩 AI 时序预测 V9 Stable

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests

      - name: 检查脚本
        run: |
          ls -lah
          python --version

      - name: 运行 AI 时序预测
        run: |
          python sdxmacau.py \
            --order 2 \
            --backtest 120
        continue-on-error: true

      - name: 查看数据库
        run: |
          ls -lah *.db || echo "暂无数据库"

      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.db || true

          git commit -m "AI时序预测更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "无变化"

          git push || echo "推送失败"

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-ai-db
          path: "*.db"