name: 三彩种属性预测

on:
  schedule:
    # 北京时间每天 22:30（UTC 14:30）运行，可在 Actions 页面手动触发
    - cron: '30 14 * * *'
  workflow_dispatch:   # 允许手动执行

permissions:
  contents: write      # 允许推送提交

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 超时保护

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整历史，避免推送冲突

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'       # 启用依赖缓存，加速后续运行

      - name: 安装依赖
        run: pip install numpy

      - name: 运行预测引擎（三个彩种，回测最近 100 期）
        run: python sdxmacau.py --order 3 --min-ig 0.01 --temp 1.0 --backtest 100

      - name: 检查数据库变化
        id: changes
        run: |
          if git diff --quiet old_macau.db hk_macau.db xin_macau.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送数据库更新
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add old_macau.db hk_macau.db xin_macau.db
          git commit -m "📊 自动更新数据 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')"
          git pull --rebase   # 先拉取远程更新，避免推送冲突
          git push

      - name: 备份数据库（Artifact 存档）
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs-$(date +'%Y%m%d-%H%M')
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db
          retention-days: 30   # 备份保留 30 天
