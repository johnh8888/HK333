name: 三彩种属性预测

on:
  schedule:
    # 北京时间每天 22:30
    - cron: '30 14 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  predict:

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      # =====================================================
      # Checkout
      # =====================================================

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # Python
      # =====================================================

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =====================================================
      # Install
      # =====================================================

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      # =====================================================
      # Run Prediction
      # =====================================================

      - name: 运行 V14-QUANT FINAL
        run: |

          echo "=================================================="
          echo "香港彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 香港彩 \
            --recent 240 \
            --bankroll 10000 \
            --test 100

          echo "=================================================="
          echo "老澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 老澳门彩 \
            --recent 240 \
            --bankroll 10000 \
            --test 100

          echo "=================================================="
          echo "新澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 新澳门彩 \
            --recent 240 \
            --bankroll 10000 \
            --test 100

      # =====================================================
      # Check DB Changes
      # =====================================================

      - name: 检查数据库变化
        id: changes
        run: |

          git add old_macau.db hk_macau.db xin_macau.db

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # =====================================================
      # Commit
      # =====================================================

      - name: 提交数据库更新
        if: steps.changes.outputs.changed == 'true'
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "📊 自动更新数据 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')"

      # =====================================================
      # Pull/Rebase
      # =====================================================

      - name: 拉取远程最新
        if: steps.changes.outputs.changed == 'true'
        run: |

          git pull --rebase origin main

      # =====================================================
      # Push
      # =====================================================

      - name: 推送更新
        if: steps.changes.outputs.changed == 'true'
        run: |

          git push origin HEAD:main

      # =====================================================
      # Artifact Backup
      # =====================================================

      - name: 上传数据库备份
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db
          retention-days: 30