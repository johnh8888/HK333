name: 澳门彩 AI 时序预测

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          pip install numpy

      - name: Run
        run: |
          python sdxmacau.py \
            --order 2 \
            --backtest 30

      - name: Commit DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.db || true

          git commit -m "AI预测更新 $(date)" || echo "No changes"

          git push

      - name: Upload DB
        uses: actions/upload-artifact@v4
        with:
          name: marksix-db
          path: "*.db"