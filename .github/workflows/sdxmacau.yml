name: 三彩种属性预测

on:
  schedule:
    # 北京时间每天 22:30（UTC 14:30）
    - cron: '30 14 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # ==================================================
      # 检出代码
      # ==================================================

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==================================================
      # Python
      # ==================================================

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ==================================================
      # 安装依赖
      # ==================================================

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      # ==================================================
      # 运行预测
      # ==================================================

      - name: 运行预测引擎
        run: |

          echo "=================================================="
          echo "香港彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 香港彩 \
            --recent 240 \
            --bankroll 10000 \
            --test 10

          echo "=================================================="
          echo "老澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 老澳门彩 \
            --recent 240 \
            --bankroll 10000 \
            --test 10

          echo "=================================================="
          echo "新澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 新澳门彩 \
            --recent 240 \
            --bankroll 10000 \
            --test 10

      # ==================================================
      # 检查数据库变化
      # ==================================================

      - name: 检查数据库变化
        id: changes
        run: |

          if git diff --quiet old_macau.db hk_macau.db xin_macau.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ==================================================
      # 提交数据库
      # ==================================================

      - name: 提交并推送数据库
        if: steps.changes.outputs.changed == 'true'
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add old_macau.db hk_macau.db xin_macau.db

          git commit -m "📊 自动更新数据 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "没有变更"

          git pull --rebase origin main || true

          git push

      # ==================================================
      # Artifact 备份
      # ==================================================

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db
          retention-days: 30