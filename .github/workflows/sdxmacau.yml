name: 三彩种属性预测

on:
  schedule:
    # 北京时间每天 22:30（UTC 14:30）运行
    - cron: '30 14 * * *'
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install numpy

      - name: 运行预测引擎（三个彩种）
        run: |
          echo "========================================"
          echo "🚀 开始运行 新澳门彩 预测"
          echo "========================================"
          python sdxmacau.py --lottery 新澳门彩 --recent 220 --test 100
          
          echo "========================================"
          echo "🚀 开始运行 老澳门彩 预测"
          echo "========================================"
          python sdxmacau.py --lottery 老澳门彩 --recent 220 --test 100
          
          echo "========================================"
          echo "🚀 开始运行 香港彩 预测"
          echo "========================================"
          python sdxmacau.py --lottery 香港彩 --recent 220 --test 100

      - name: 检查数据库是否有更新
        id: changes
        run: |
          if git diff --quiet old_macau.db hk_macau.db xin_macau.db 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📌 数据库无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📌 数据库有更新"
          fi

      - name: 提交并推送数据库更新
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add old_macau.db hk_macau.db xin_macau.db
          
          git commit -m "📊 自动更新三彩种数据库 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')"
          
          git pull --rebase
          git push

      - name: 备份数据库（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs-${{ github.run_id }}
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db
          retention-days: 30

      - name: 清理临时文件
        if: always()
        run: rm -f *.pyc __pycache__/* 2>/dev/null || true