name: 三彩种属性预测

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install numpy

      - name: 运行预测
        run: python sdxmacau.py --order 3 --min-ig 0.01 --backtest 100

      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add old_macau.db hk_macau.db xin_macau.db
          git commit -m "自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "无变化"
          git push

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-dbs-backup
          path: |
            old_macau.db
            hk_macau.db
            xin_macau.db