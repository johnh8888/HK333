name: 三彩种属性预测

on:

  schedule:
    # 香港时间每天 22:30
    - cron: '30 14 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  predict:

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      # =====================================================
      # 检出仓库
      # =====================================================

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # Python
      # =====================================================

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =====================================================
      # 安装依赖
      # =====================================================

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

      # =====================================================
      # 香港彩
      # =====================================================

      - name: 香港彩预测
        run: |

          echo "=================================================="
          echo "香港彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 香港彩 \
            --test 10

      # =====================================================
      # 老澳门彩
      # =====================================================

      - name: 老澳门彩预测
        run: |

          echo "=================================================="
          echo "老澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 老澳门彩 \
            --test 10

      # =====================================================
      # 新澳门彩
      # =====================================================

      - name: 新澳门彩预测
        run: |

          echo "=================================================="
          echo "新澳门彩"
          echo "=================================================="

          python sdxmacau.py \
            --lottery 新澳门彩 \
            --test 10

      # =====================================================
      # 查看数据库
      # =====================================================

      - name: 查看数据库文件
        run: |

          ls -lh *.db || true

      # =====================================================
      # 检查变更
      # =====================================================

      - name: 检查数据库变化
        id: changes
        run: |

          git diff --quiet *.db && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      # =====================================================
      # 自动提交
      # =====================================================

      - name: 提交数据库更新
        if: steps.changes.outputs.changed == 'true'
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add *.db

          git commit -m "📊 自动更新数据 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || exit 0

          git pull --rebase origin main

          git push origin HEAD:main

      # =====================================================
      # 上传数据库备份
      # =====================================================

      - name: 备份数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-database-backup
          path: |
            *.db
          retention-days: 30

      # =====================================================
      # 上传日志
      # =====================================================

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: |
            ./*.log
          if-no-files-found: ignore
          retention-days: 7