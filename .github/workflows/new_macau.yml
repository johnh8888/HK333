name: 新澳门六合彩预测系统

on:
  schedule:
    - cron: "0 13,1 * * *"
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 下载数据库
        uses: actions/download-artifact@v4
        with:
          name: macau-db
          path: .
        continue-on-error: true

      - name: 执行预测
        run: |

          success=0

          for i in 1 2 3
          do
            echo "第 $i 次执行预测..."

            python new_macau.py sync \
              --with-backtest \
              --auto-tune \
              --color-window 10 \
              --color-method weighted

            if [ $? -eq 0 ]; then
              success=1
              echo "预测成功"
              break
            fi

            echo "预测失败，10秒后重试..."
            sleep 10
          done

          if [ $success -ne 1 ]; then
            echo "连续失败，任务终止"
            exit 1
          fi

      - name: 上传数据库
        uses: actions/upload-artifact@v4
        with:
          name: macau-db
          path: macau.db
          retention-days: 7