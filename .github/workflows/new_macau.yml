name: 新澳门六合彩AI预测

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ai-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 恢复数据库
        uses: actions/download-artifact@v4
        with:
          name: new-macau-db
          path: .
        continue-on-error: true

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行 AI 同步预测
        run: |
          success=0

          for i in 1 2 3
          do
            echo "第 $i 次执行预测..."

            python new_macau.py \
              --color-window 10 \
              --color-method weighted \
              sync \
              --with-backtest \
              --auto-tune

            if [ $? -eq 0 ]; then
              success=1
              echo "预测成功"
              break
            fi

            echo "预测失败，10秒后重试..."
            sleep 10
          done

          if [ $success -ne 1 ]; then
            echo "连续失败，任务终止"
            exit 1
          fi

      - name: 上传数据库
        uses: actions/upload-artifact@v4
        with:
          name: new-macau-db
          path: new_macau.db
          retention-days: 7