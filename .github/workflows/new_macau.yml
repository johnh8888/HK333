name: 新澳门彩数据同步与预测

on:
  schedule:
    - cron: "0 13,1 * * *"
  workflow_dispatch:

jobs:
  update-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 下载历史数据库（可选）
        uses: actions/download-artifact@v4
        with:
          name: macau-db
          path: .
        continue-on-error: true

      - name: 运行预测脚本
        run: python new_macau.py

      - name: 上传数据库（供下次使用）
        uses: actions/upload-artifact@v4
        with:
          name: macau-db
          path: new_macau.db
          retention-days: 7