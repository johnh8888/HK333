name: AI Lottery Predictor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Predictor
        run: |

          success=0

          for i in 1 2 3
          do
            echo "第 $i 次执行预测..."

            python new_macau.py sync

            if [ $? -eq 0 ]; then
              success=1
              echo "预测成功"
              break
            fi

            echo "预测失败，10秒后重试..."
            sleep 10
          done

          if [ $success -ne 1 ]; then
            echo "连续失败，任务终止"
            exit 1
          fi