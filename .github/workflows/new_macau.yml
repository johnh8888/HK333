name: 新澳门彩预测系统

on:
  schedule:
    # 每30分钟运行一次
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  预测任务:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

      - name: 运行新澳门彩预测
        run: |
          python new_macau.py sync

      - name: 保存数据库
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.db || true

          git diff --cached --quiet || git commit -m "自动更新预测数据库"

          git push