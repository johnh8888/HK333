name: 新澳门彩数据同步与预测（持久化）

on:
  schedule:
    - cron: "0 13,1 * * *"   # UTC 13:00/01:00 -> 北京时间 21:00/09:00
  workflow_dispatch:

jobs:
  update-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---- 下载上次保存的数据库 ----
      - name: 下载历史数据库
        uses: actions/download-artifact@v4
        with:
          name: macau-db
          path: .
        continue-on-error: true   # 首次运行没有文件，不报错

      - name: 运行数据同步与预测
        run: python new_macau.py

      # ---- 上传更新后的数据库 ----
      - name: 上传数据库（供下次使用）
        uses: actions/upload-artifact@v4
        with:
          name: macau-db
          path: new_macau.db
          retention-days: 7   # 保留7天，足够衔接