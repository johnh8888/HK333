name: 新澳门六合彩自动预测

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 删除旧数据库
        run: rm -f new_macau.db

      - name: 执行预测
        run: python new_macau.py sync

      - name: 提交数据库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add new_macau.db

          git commit -m "🤖 自动更新 $(date)" || echo "No changes"

          git push

      - uses: actions/upload-artifact@v4
        with:
          name: new-macau-db
          path: new_macau.db