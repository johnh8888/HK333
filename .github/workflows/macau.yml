name: 老澳门六合彩自动预测

on:
  schedule:
    # 北京时间 22:00 (UTC 14:00) 运行，因为老澳门开奖通常在 21:30 左右
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install numpy lightgbm xgboost catboost

      - name: 运行同步、回测、调优与预测
        run: python macau.py sync --with-backtest --auto-tune

      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macau.db
          git commit -m "🤖 老澳门六合彩自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push

      - name: 保存 Artifact 备份
        uses: actions/upload-artifact@v4
        with:
          name: macau-db-backup
          path: macau.db
