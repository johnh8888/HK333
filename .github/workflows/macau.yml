name: 老澳门六合彩自动预测

on:
  schedule:
    # 每天北京时间 22:05 运行（开奖时间 21:30 之后）
    - cron: '5 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install numpy scikit-learn lightgbm xgboost catboost

      - name: 自动修复 Python 脚本中的中英文混用问题
        run: |
          # 修复全角标点符号
          sed -i 's/，/,/g; s/。/. /g; s/；/;/g; s/：/:/g; s/！/!/g; s/？/?/g; s/（/(/g; s/）/)/g; s/【/[/g; s/】/]/g; s/“/"/g; s/”/"/g; s/‘/'"'"'/g; s/’/'"'"'/g' macau.py
          # 修复中文关键字：在 -> in
          sed -i 's/\b在\b/in/g' macau.py
          # 修复可能的中文“如果”（如果出现在 if 后，则需要删除，但较复杂，先处理常见）
          sed -i 's/如果/if/g' macau.py
          sed -i 's/否则/else/g' macau.py
          sed -i 's/并且/and/g' macau.py
          sed -i 's/或者/or/g' macau.py
          # 修复中文 True/False/None
          sed -i 's/真/True/g; s/假/False/g; s/空/None/g' macau.py

      - name: 运行同步、回测、调优与预测
        run: python macau.py sync --with-backtest --auto-tune

      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macau.db
          git commit -m "🤖 老澳门六合彩自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "无变化"
          git push

      - name: 保存数据库备份
        uses: actions/upload-artifact@v4
        with:
          name: macau-db-backup
          path: macau.db
