name: 老澳门六合彩自动预测

on:
  schedule:
    - cron: '0 15 * * *'   # 根据实际开奖时间调整
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行同步、回测、调优与预测
        run: python macau.py sync --with-backtest --auto-tune

      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macau.db
          git commit -m "🤖 老澳门自动更新 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push

      - name: 保存 Artifact（备查）
        uses: actions/upload-artifact@v4
        with:
          name: macau-db-backup
          path: macau.db