name: 六合彩自动预测

on:
  schedule:
    - cron: '0 14 * * 2,4,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 运行预测
        run: python marksix.py sync --db marksix_local.db
      - name: 提交数据库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marksix_local.db
          git commit -m "🤖 自动预测 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
      - name: 保存 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: marksix-db-backup
          path: marksix_local.db