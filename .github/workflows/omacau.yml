name: 新澳门六合彩AI-V6

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 签出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

      - name: 运行AI预测系统
        run: |
          python macau_v6.py

      - name: 提交数据库和面板
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add macau_v6.db dashboard.html
          git diff --cached --quiet || git commit -m "AI自动更新"
          git push