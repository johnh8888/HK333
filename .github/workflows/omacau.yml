name: 新澳门六合彩AI系统

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install requests numpy pandas matplotlib scikit-learn

      - name: 运行AI系统
        run: |
          python macau_v11.py

      - name: 自动提交数据库
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "AI自动更新" || echo "无更新"

          git push