name: 新澳门自动预测

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

      - name: 运行主脚本
        run: |
          python macau_predictor_pro_v4.py sync

      - name: 提交数据库
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add new_macau.db
          git diff --cached --quiet || git commit -m "自动更新新澳门数据"
          git push