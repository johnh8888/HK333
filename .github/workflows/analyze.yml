name: 澳门彩票预测系统 V8

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  predict:
    name: V8 数据分析与预测
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装依赖
        run: |
          pip install pandas numpy

      - name: 🗄️ 检查数据库
        run: |
          if [ ! -f "new_macau.db" ]; then
            echo "数据库不存在"
            exit 1
          fi

      - name: 🚀 运行V8分析
        run: |
          python analyzer.py > result.txt

      - name: 📦 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: 澳门预测V8结果
          path: |
            result.txt
            prediction.json