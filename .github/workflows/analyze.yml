name: 澳门彩票预测系统

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  predict:
    name: 数据分析与预测
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下载仓库
        uses: actions/checkout@v4

      - name: 🐍 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: 🗄️ 检查数据库
        run: |
          ls -lah
          if [ ! -f "new_macau.db" ]; then
            echo "数据库不存在"
            exit 1
          fi

      - name: 🔍 运行分析器
        run: |
          python analyzer.py > result.txt

      - name: 🎯 生成预测结果
        run: |
          python analyzer.py

      - name: 📤 上传预测文件
        uses: actions/upload-artifact@v4
        with:
          name: 澳门预测结果
          path: |
            result.txt
            prediction.json